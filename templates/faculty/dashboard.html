{% extends "base.html" %}
{% block title %}My Dashboard — Timetable Generator{% endblock %}
{% block page_title %}My Dashboard{% endblock %}

{% block content %}
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-value">{{ entries|length }}</div>
        <div class="stat-label">My Classes This Week</div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <span class="card-title">Quick Links</span>
    </div>
    <div class="card-body" style="display:flex;gap:1rem;flex-wrap:wrap;">
        <a href="{{ url_for('faculty.my_timetable') }}" class="btn btn-primary">🗓️ My Timetable</a>
        <a href="{{ url_for('faculty.master_timetable') }}" class="btn btn-secondary">📋 Master Timetable</a>
    </div>
</div>
{% endblock %}
