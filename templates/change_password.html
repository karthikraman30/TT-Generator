<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password — Timetable Generator</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <div class="card">
        <h2>Change Password</h2>
        <p>This password is required on first login. It must be at least 8 characters and include an uppercase letter, a lowercase letter, a digit and a special character.</p>
        <form method="POST" action="">
            <div class="form-group">
                <label for="new_password">New password</label>
                <input type="password" id="new_password" name="new_password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div id="pw_error" class="flash flash-error" style="display:none;margin-bottom:1rem;"></div>
            <button type="submit" class="btn btn-primary">Set password</button>
        </form>
    </div>
</div>

<script>
(function(){
    const form = document.querySelector('form');
    const pw = document.getElementById('new_password');
    const confirm = document.getElementById('confirm_password');
    const err = document.getElementById('pw_error');

    function validate(pwVal, confVal){
        const policy = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,}$/;
        if(!policy.test(pwVal)) return 'Password must be at least 8 characters and include upper, lower, digit and special character.';
        if(pwVal !== confVal) return 'Passwords do not match.';
        return '';
    }

    form.addEventListener('submit', function(e){
        const message = validate(pw.value, confirm.value);
        if(message){
            e.preventDefault();
            err.textContent = message;
            err.style.display = 'block';
        }
    });
})();
</script>
</body>
</html>
